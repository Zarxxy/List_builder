name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Unit tests and lint never launch a browser, so skip lifecycle scripts
        # (the postinstall would otherwise download Chromium via Playwright).
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
