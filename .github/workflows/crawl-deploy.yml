name: Crawl & Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 6 * * 0'   # Sundays 06:00 UTC
  workflow_dispatch:
    inputs:
      faction:
        description: 'Faction to crawl (display name)'
        default: 'Death Guard'
      edition:
        description: 'Edition (11ed or 10ed)'
        default: '11ed'

permissions:
  pages: write
  id-token: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Crawl Death Guard (11th Edition)
        run: npm run crawl:dg
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Build GitHub Pages data
        run: node build-pages.js

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
