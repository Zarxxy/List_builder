name: Crawl & Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      faction:
        description: 'Faction to crawl'
        type: choice
        default: 'Death Guard'
        options:
          - 'Death Guard'
          - 'Space Marines'
          - 'Astra Militarum'
          - 'Aeldari'
          - 'Chaos Space Marines'
          - 'Orks'
          - 'Tyranids'
          - 'Necrons'
          - "T'au Empire"
          - 'Drukhari'
          - 'Adeptus Mechanicus'
          - 'Adeptus Custodes'
          - 'Grey Knights'
          - 'Dark Angels'
          - 'Blood Angels'
          - 'Space Wolves'
          - 'Black Templars'
          - 'Deathwatch'
          - 'Thousand Sons'
          - 'World Eaters'
          - 'Chaos Daemons'
          - 'Imperial Knights'
          - 'Chaos Knights'
          - 'Leagues of Votann'
          - 'Adepta Sororitas'
          - 'Genestealer Cults'
      edition:
        description: 'Edition'
        type: choice
        default: '11ed'
        options:
          - '11ed'
          - '10ed'

permissions:
  pages: write
  id-token: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Crawl faction
        run: node crawler/index.js --faction "${{ github.event.inputs.faction || 'Death Guard' }}" --edition "${{ github.event.inputs.edition || '11ed' }}"
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Build GitHub Pages data
        run: node build-pages.js

      - name: Configure Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
