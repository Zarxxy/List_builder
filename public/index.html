<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH40K List Analyzer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128;
    --border: #30363d; --text: #e6edf3; --muted: #8b949e;
    --green: #1e8449; --red: #c0392b; --amber: #d68910;
    --blue: #1a5276; --purple: #7d3c98; --accent: #238636;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header .subtitle { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .server-badge { font-size: 0.75rem; background: #0f2d15; border: 1px solid #238636; border-radius: 6px; color: #3fb950; padding: 4px 10px; white-space: nowrap; }
  main { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
  .edition-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .edition-btn { position: relative; }
  .edition-btn input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
  .edition-btn label {
    display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
    font-size: 0.9rem; color: var(--text); background: var(--bg3); margin: 0;
  }
  .edition-btn input:checked + label { border-color: var(--accent); background: #0f2d15; color: #3fb950; }
  select, textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 9px 12px; font-size: 0.9rem;
  }
  select:focus, textarea:focus { outline: none; border-color: #388bfd; }
  textarea { font-family: 'Courier New', monospace; min-height: 240px; resize: vertical; }
  .analyze-btn {
    width: 100%; padding: 11px; background: var(--accent); border: none;
    border-radius: 6px; color: #fff; font-size: 1rem; font-weight: 600;
    cursor: pointer; margin-top: 14px; transition: opacity 0.15s;
  }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .analyze-btn:not(:disabled):hover { opacity: 0.85; }
  .error-box { background: #2d1a1a; border: 1px solid #c0392b44; border-radius: 6px; padding: 12px 16px; color: #e57373; margin-top: 12px; display: none; }
  .spinner { display: none; text-align: center; padding: 32px; color: var(--muted); }
  #results { display: none; }
  .score-badge {
    text-align: center; padding: 24px; border-radius: 8px; margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .score-badge .score-num { font-size: 4rem; font-weight: 700; line-height: 1; }
  .score-badge .score-label { font-size: 1.1rem; font-weight: 500; margin-top: 6px; }
  .score-casual    { background: #2d0d0d; color: #e57373; border-color: #c0392b44; }
  .score-below-meta { background: #2a1e0a; color: #f0a32e; border-color: #d6891044; }
  .score-competitive { background: #0a1a2a; color: #58a6ff; border-color: #1a527644; }
  .score-strong    { background: #0d2218; color: #56d364; border-color: #1e844944; }
  .score-meta-optimal { background: #1a0a2e; color: #bc8cff; border-color: #7d3c9844; }
  .verdict-banner { border-left: 4px solid var(--accent); padding: 12px 16px; background: var(--bg2); border-radius: 0 6px 6px 0; margin-bottom: 16px; font-size: 1rem; }
  details { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; }
  details summary { padding: 12px 16px; cursor: pointer; font-weight: 500; font-size: 0.9rem; list-style: none; display: flex; align-items: center; gap: 8px; }
  details summary::before { content: '▶'; font-size: 0.7rem; color: var(--muted); transition: transform 0.2s; }
  details[open] summary::before { transform: rotate(90deg); }
  details .inner { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 0.9rem; line-height: 1.6; }
  .sw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
  .sw-col { border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
  .sw-col h4 { font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
  .sw-col.strengths h4 { color: #56d364; }
  .sw-col.weaknesses h4 { color: #e57373; }
  .sw-col li { margin-left: 16px; margin-bottom: 4px; font-size: 0.85rem; }
  .rec-card { border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; display: flex; gap: 12px; align-items: flex-start; }
  .rec-num { background: var(--accent); color: #fff; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
  .rec-text { font-size: 0.9rem; line-height: 1.5; }
  .mock-notice { background: #2a1e0a; border: 1px solid #d6891044; border-radius: 6px; padding: 8px 12px; color: #f0a32e; font-size: 0.8rem; margin-bottom: 8px; }
  .results-footer { text-align: center; color: var(--muted); font-size: 0.78rem; padding: 12px; }
  @media (max-width: 600px) { .sw-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div>
    <h1>WH40K List Analyzer</h1>
    <div class="subtitle">AI-powered competitive analysis · Multi-source tournament data</div>
  </div>
  <div class="server-badge">API key loaded from server environment</div>
</header>

<main>
  <div class="card">
    <label>Edition</label>
    <div class="edition-toggle">
      <div class="edition-btn">
        <input type="radio" name="edition" id="ed11" value="11ed" checked>
        <label for="ed11">11th Edition</label>
      </div>
      <div class="edition-btn">
        <input type="radio" name="edition" id="ed10" value="10ed">
        <label for="ed10">10th Edition</label>
      </div>
    </div>

    <label for="factionSelect">Faction</label>
    <select id="factionSelect">
      <option value="">Loading factions…</option>
    </select>

    <div style="margin-top:14px;">
      <label for="listText">Army List</label>
      <textarea id="listText" placeholder="Paste your army list here…

Example (11th Edition):
Army Faction: Death Guard
Detachment: Plague Company

HQ:
• Daemon Prince of Nurgle [165pts]

Troops:
• Plague Marines [100pts]
• Plague Marines [100pts]

etc."></textarea>
    </div>

    <button class="analyze-btn" id="analyzeBtn" disabled>Analyze List</button>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div class="spinner" id="spinner">
    <p>Analyzing your list against the tournament meta…</p>
    <p style="margin-top:8px;font-size:0.8rem;">This may take up to 30 seconds.</p>
  </div>

  <div id="results"></div>
</main>

<script src="/shared/format.js"></script>
<script>
'use strict';

// esc() and scoreBand() come from /shared/format.js (loaded above).
let allFactions = [];
const factionSelect = document.getElementById('factionSelect');
const listText = document.getElementById('listText');
const analyzeBtn = document.getElementById('analyzeBtn');
const spinner = document.getElementById('spinner');
const resultsEl = document.getElementById('results');
const errorBox = document.getElementById('errorBox');

function getEdition() {
  return document.querySelector('input[name="edition"]:checked').value;
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
  spinner.style.display = 'none';
  analyzeBtn.disabled = false;
}

function hideError() {
  errorBox.style.display = 'none';
}

function setLoading(on) {
  spinner.style.display = on ? 'block' : 'none';
  analyzeBtn.disabled = on;
  if (on) {
    resultsEl.style.display = 'none';
    hideError();
  }
}

function rebuildFactionOptions() {
  const edition = getEdition();
  factionSelect.innerHTML = '';
  const placeholder = document.createElement('option');
  placeholder.value = '';
  placeholder.textContent = '— Select a faction —';
  factionSelect.appendChild(placeholder);

  for (const f of allFactions) {
    const count = f.listCounts?.[edition] || 0;
    const suffix = count > 0 ? ` (${count} lists — live)` : ' (meta snapshot)';
    const opt = document.createElement('option');
    opt.value = f.key;
    opt.textContent = f.label + suffix;
    factionSelect.appendChild(opt);
  }
  updateBtn();
}

function updateBtn() {
  const ready = factionSelect.value && listText.value.trim().length >= 10;
  analyzeBtn.disabled = !ready;
}

async function loadFactions() {
  try {
    const res = await fetch('/api/factions');
    if (!res.ok) throw new Error('Failed to load factions');
    const data = await res.json();
    allFactions = data.factions || [];
    rebuildFactionOptions();
  } catch {
    factionSelect.innerHTML = '<option value="">Error loading factions — is the server running?</option>';
  }
}

function renderResults(result) {
  const band = scoreBand(result.score || 0);
  const edLabel = result.edition === '10ed' ? '10th Edition' : '11th Edition';

  const strengths = (result.strengths || []).map(s => `<li>${esc(s)}</li>`).join('');
  const weaknesses = (result.weaknesses || []).map(w => `<li>${esc(w)}</li>`).join('');
  const comparisons = (result.comparison_points || []).map((c, i) => `<li>${esc(c)}</li>`).join('');
  const recs = (result.recommendations || []).map((r, i) =>
    `<div class="rec-card"><div class="rec-num">${i + 1}</div><div class="rec-text">${esc(r)}</div></div>`
  ).join('');

  const mockNotice = result.isMockData
    ? `<div class="mock-notice">⚠ Using synthetic meta snapshot — crawl this faction for live tournament data.</div>`
    : '';

  const sourceStr = Object.entries(result.sources || {}).map(([k, v]) => `${k}: ${v}`).join(', ') || 'none';
  const dataLine = result.isMockData
    ? 'Synthetic meta snapshot (approximate)'
    : `Real tournament data — sources: ${sourceStr}`;

  resultsEl.innerHTML = `
    <div class="score-badge score-${band}">
      <div class="score-num">${result.score || '?'}</div>
      <div class="score-label">${esc(result.score_label || band)}</div>
    </div>

    <div class="verdict-banner">${esc(result.verdict || '')}</div>

    <details open>
      <summary>Meta Context</summary>
      <div class="inner">
        ${mockNotice}
        <p style="margin-bottom:6px;font-size:0.8rem;color:var(--muted);">${esc(dataLine)}</p>
        ${esc(result.meta_explanation || '')}
      </div>
    </details>

    <details open>
      <summary>Detachment Analysis</summary>
      <div class="inner">${esc(result.detachment_analysis || '')}</div>
    </details>

    <div class="sw-grid">
      <div class="sw-col strengths">
        <h4>Strengths</h4>
        <ul>${strengths}</ul>
      </div>
      <div class="sw-col weaknesses">
        <h4>Weaknesses</h4>
        <ul>${weaknesses}</ul>
      </div>
    </div>

    <details>
      <summary>Comparison to Meta</summary>
      <div class="inner"><ol style="margin-left:18px;">${comparisons}</ol></div>
    </details>

    <details>
      <summary>Recommendations</summary>
      <div class="inner">${recs}</div>
    </details>

    <div class="results-footer">
      Analyzed against ${result.totalLists || 0} lists (${edLabel}) using ${esc(result.model || 'Claude')}
    </div>
  `;
  resultsEl.style.display = 'block';
}

async function analyze() {
  const faction = factionSelect.value;
  const edition = getEdition();
  const list = listText.value.trim();

  if (!faction) return showError('Please select a faction.');
  if (list.length < 10) return showError('Please paste your army list (minimum 10 characters).');

  setLoading(true);

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 90000);

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      signal: controller.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ listText: list, faction, edition }),
    });
    clearTimeout(timer);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) return showError('Server API key is invalid — check ANTHROPIC_API_KEY env var.');
      if (res.status === 429) return showError(err.error || 'Rate limited. Please wait a moment.');
      if (res.status === 503) return showError('ANTHROPIC_API_KEY is not configured on the server.');
      return showError(err.error || `Server error (${res.status})`);
    }

    const result = await res.json();
    setLoading(false);
    renderResults(result);
  } catch (err) {
    clearTimeout(timer);
    if (err.name === 'AbortError') return showError('Analysis timed out after 90 seconds — please try again.');
    showError('Network error — is the server running?');
  } finally {
    spinner.style.display = 'none';
    analyzeBtn.disabled = !factionSelect.value || listText.value.trim().length < 10;
  }
}

document.querySelectorAll('input[name="edition"]').forEach(r => r.addEventListener('change', rebuildFactionOptions));
factionSelect.addEventListener('change', updateBtn);
listText.addEventListener('input', updateBtn);
analyzeBtn.addEventListener('click', analyze);

loadFactions();
</script>
</body>
</html>
