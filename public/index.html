<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH40K List Analyzer</title>
<link rel="stylesheet" href="/shared/styles.css">
<style>
  /* Page-specific chrome; everything else comes from /shared/styles.css. */
  .server-badge { font-size: 0.75rem; background: #0f2d15; border: 1px solid #238636; border-radius: 6px; color: #3fb950; padding: 4px 10px; white-space: nowrap; }
</style>
</head>
<body>

<header>
  <div>
    <h1>WH40K List Analyzer</h1>
    <div class="subtitle">AI-powered competitive analysis · Multi-source tournament data</div>
  </div>
  <div class="server-badge">API key loaded from server environment</div>
</header>

<main>
  <div class="card">
    <label>Edition</label>
    <div class="edition-toggle">
      <div class="edition-btn">
        <input type="radio" name="edition" id="ed11" value="11ed" checked>
        <label for="ed11">11th Edition</label>
      </div>
      <div class="edition-btn">
        <input type="radio" name="edition" id="ed10" value="10ed">
        <label for="ed10">10th Edition</label>
      </div>
    </div>

    <label for="factionSelect">Faction</label>
    <select id="factionSelect">
      <option value="">Loading factions…</option>
    </select>

    <div style="margin-top:14px;">
      <label for="listText">Army List</label>
      <textarea id="listText" placeholder="Paste your army list here…

Example (11th Edition):
Army Faction: Death Guard
Detachment: Plague Company

HQ:
• Daemon Prince of Nurgle [165pts]

Troops:
• Plague Marines [100pts]
• Plague Marines [100pts]

etc."></textarea>
      <div class="list-summary" id="listSummary"></div>
    </div>

    <button class="analyze-btn" id="analyzeBtn" disabled>Analyze List</button>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div class="spinner" id="spinner">
    <p>Analyzing your list against the tournament meta…</p>
    <p style="margin-top:8px;font-size:0.8rem;">This may take up to 30 seconds.</p>
  </div>

  <div id="results"></div>
</main>

<script src="/shared/format.js"></script>
<script src="/shared/list-summary.js"></script>
<script src="/app.js"></script>
</body>
</html>
